name: Build kernel for beyond1lte

on:
  push:
    paths:
      - '.github/workflows/beyond1lte.yml'
      - 'patches/**'
  workflow_dispatch:

env:
  KPATH: /home/runner/work/ksu-beyond1/ksu-beyond1/kernel
  TPATH: /home/runner/work/ksu-beyond1/ksu-beyond1/toolchain

jobs:
  build:
    strategy:
      matrix:
        kpath: [/home/runner/work/ksu-beyond1/ksu-beyond1/kernel]
        tpath: [/home/runner/work/ksu-beyond1/ksu-beyond1/toolchain]
    runs-on: ubuntu-20.04
    steps:
      - name: Install dependencies
        run: sudo apt-get install flex bison ncurses-dev texinfo gcc gperf patch libtool automake g++ libncurses5-dev gawk subversion expat libexpat1-dev python-all-dev binutils-dev bc libcap-dev autoconf libgmp-dev build-essential pkg-config libmpc-dev libmpfr-dev autopoint gettext txt2man liblzma-dev libssl-dev libz-dev mercurial wget tar gcc-10 g++-10 zstd libarchive-tools -y --fix-broken --fix-missing

      - name: Get kernel source
        uses: actions/checkout@v3
        with:
          repository: linux4-bringup-priv/android_kernel_samsung_exynos9820
          ref: lineage-21.0
          path: ${{ matrix.kpath }}
          fetch-depth: 100

      - name: Get clang toolchain
        uses: actions/checkout@v3
        with:
          repository: kdrag0n/proton-clang
          path: ${{ matrix.tpath }}
          fetch-depth: 100

      - name: Integrate KernelSU
        run: |
          cd ${{ matrix.kpath }}
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s -- "9403c8f"
          git config advice.addEmbeddedRepo "false"
          git config --global user.email "20985102-alemontn@users.noreply.gitlab.com"
          git config --global user.name "basil"
          git add . || true
          git commit -a -m "add KernelSU"

      - name: Get patches
        uses: actions/checkout@v3
        with:
          repository: alemontn/ksu-beyond1
          path: /home/runner/work/ksu-beyond1/ksu-beyond1/patches

      - name: Apply patches
        run: |
          cd ${{ matrix.kpath }}
          for patch in $(ls -d ../patches/patches/*.patch 2>/dev/null); do
            git apply "$patch"
          done

      - name: Build kernel
        env:
          CC: clang
          CROSS_COMPILE: aarch64-linux-gnu-
          ARCH: arm64
          SUBARCH: arm64
        run: |
          cd ${{ matrix.kpath }}
          export PATH="${{ matrix.tpath }}"/bin:"$PATH"
          export CC CROSS_COMPILE ARCH SUBARCH
          make CC=$CC O=out "exynos9820-beyond1lte_defconfig"
          make -j$(nproc --all) CC=$CC O=out
          mv out/arch/arm64/boot/Image.gz ~

      - name: Upload compiled kernel
        uses: actions/upload-artifact@v3
        with:
          name: kernel
          path: /home/runner/Image.gz
